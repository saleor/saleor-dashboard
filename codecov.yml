coverage:
  status:
    patch:
      default:
        target: auto
    project:
      default:
        target: auto

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: units
      paths:
        - src/
      carryforward: true
    - name: storybook
      paths:
        - src/
      carryforward: true

ignore:
  - "src/graphql/**"
  - "./src/**/queries.ts"
  - "./src/**/mutations.ts"
  - "./src/**/fragments/*.ts"
  - "./src/searches/*.ts"
  - ".featureFlags/**"
  - "testUtils/**"
  - "assets/**"
  - "lint/**"
  - "scripts/**"
  - "**/*.config.js"
  - "**/*.config.ts"
