name: QA
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-lock:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          # Don't cache in this job as we don't install dependencies

      - name: Audit dependencies
        run: pnpm audit --audit-level moderate

  tsc-and-linters:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Run tsc
        run: pnpm run check-types

      - name: Run lint
        run: pnpm run lint

      - name: Check for uncommitted lint changes
        run: git diff --exit-code ./src

      - name: Check Prettier formatting
        run: pnpm run format:check

  jest-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Run tests
        run: pnpm run test:ci

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: saleor/saleor-dashboard
          directory: coverage/units
          flags: units

  translation-messages:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Check message extraction
        run: |
          pnpm run extract-messages
          git diff --exit-code ./locale

  storybook-tests:
    runs-on: ubuntu-22.04
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Run Storybook tests
        run: pnpm run test-storybook:coverage

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: saleor/saleor-dashboard
          directory: coverage/storybook
          flags: storybook

  chromatic:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Run Chromatic
        uses: chromaui/action@v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          autoAcceptChanges: main
          onlyChanged: true
          zip: true
