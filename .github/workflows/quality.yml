name: Quality
permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  knip:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Knip for unused files, dependencies and exports
        run: pnpm run knip

  graphql-lint-unused:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Run graphql-lint-unused
        id: lint
        continue-on-error: true
        run: |
          OUTPUT=$(pnpm run graphql-lint-unused 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          SUMMARY=$(echo "$OUTPUT" | sed -n '/GENERAL STATISTICS/,/^$/p')
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "summary<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Comment PR with results
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          LINT_SUMMARY: ${{ steps.lint.outputs.summary }}
        with:
          script: |
            const summary = process.env.LINT_SUMMARY;
            if (!summary.trim()) return;

            const tag = '<!-- graphql-lint-unused -->';
            const body = `${tag}\n## GraphQL Unused Fields Report\n\n\`\`\`\n${summary}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(tag));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
